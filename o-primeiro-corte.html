<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1a1410">
<title>O Primeiro Corte — Helena & Vovó Mara</title>
<meta name="description" content="O primeiro corte de cabelo da Helena, pelas mãos da Vovó Mara. Um momento simples, um amor para sempre.">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  :root{
    --ink:#fdf6ee; --ink-soft:#e9ddcd; --gold:#e9c789; --rose:#f3b8c4;
    --bg:#1a1410;
    --serif:'Cormorant Garamond',Georgia,'Times New Roman',serif;
    --sans:'Segoe UI',system-ui,-apple-system,sans-serif;
  }
  html,body{height:100%;background:var(--bg);overflow:hidden;font-family:var(--sans)}
  body{color:var(--ink)}

  /* ===== Stage ===== */
  #stage{position:fixed;inset:0;background:#000;overflow:hidden}

  /* photo layers (crossfade A/B) */
  .layer{position:absolute;inset:0;opacity:0;transition:opacity 1.6s ease}
  .layer.show{opacity:1}
  .layer .bg{position:absolute;inset:-6%;background-size:cover;background-position:center;
    filter:blur(34px) brightness(.42) saturate(1.05);transform:scale(1.15)}
  .layer .ph{position:absolute;inset:0;background-size:contain;background-position:center;
    background-repeat:no-repeat;will-change:transform}
  /* gentle ken-burns */
  @keyframes kb-in{from{transform:scale(1.0)}to{transform:scale(1.12)}}
  @keyframes kb-out{from{transform:scale(1.12)}to{transform:scale(1.0)}}
  @keyframes kb-l{from{transform:scale(1.1) translateX(2.5%)}to{transform:scale(1.13) translateX(-2.5%)}}
  @keyframes kb-r{from{transform:scale(1.1) translateX(-2.5%)}to{transform:scale(1.13) translateX(2.5%)}}
  .layer.show .ph.k-in{animation:kb-in var(--dur,9s) ease-out forwards}
  .layer.show .ph.k-out{animation:kb-out var(--dur,9s) ease-out forwards}
  .layer.show .ph.k-l{animation:kb-l var(--dur,9s) ease-in-out forwards}
  .layer.show .ph.k-r{animation:kb-r var(--dur,9s) ease-in-out forwards}

  /* vignette + cinematic bars */
  #vignette{position:absolute;inset:0;pointer-events:none;
    background:radial-gradient(120% 90% at 50% 45%,transparent 55%,rgba(0,0,0,.55) 100%)}
  .bar{position:absolute;left:0;right:0;height:7vh;background:#000;z-index:6;pointer-events:none}
  .bar.top{top:0} .bar.bottom{bottom:0}

  /* ===== Captions ===== */
  #caption{position:absolute;left:0;right:0;bottom:11vh;z-index:7;text-align:center;
    padding:0 28px;pointer-events:none}
  #caption .line{display:block;font-family:var(--serif);font-weight:500;
    font-size:clamp(20px,4.6vw,38px);line-height:1.35;letter-spacing:.3px;
    text-shadow:0 2px 18px rgba(0,0,0,.8),0 0 2px rgba(0,0,0,.6);
    opacity:0;transform:translateY(14px);color:var(--ink)}
  #caption.on .line{animation:lineIn 1.1s cubic-bezier(.2,.7,.2,1) forwards}
  #caption .line:nth-child(2){animation-delay:.5s}
  #caption .line:nth-child(3){animation-delay:1s}
  #caption .line:nth-child(4){animation-delay:1.5s}
  #caption .em{color:var(--gold)}
  @keyframes lineIn{to{opacity:1;transform:translateY(0)}}

  /* ===== Title cards (full screen text) ===== */
  #card{position:absolute;inset:0;z-index:8;display:flex;flex-direction:column;
    align-items:center;justify-content:center;text-align:center;padding:40px 30px;
    opacity:0;pointer-events:none;transition:opacity 1.4s ease;
    background:radial-gradient(120% 90% at 50% 40%,#241a13 0%,#120d09 100%)}
  #card.on{opacity:1}
  #card .ct{display:block;font-family:var(--serif);font-weight:500;
    font-size:clamp(22px,5.4vw,46px);line-height:1.4;max-width:760px;
    opacity:0;transform:translateY(16px)}
  #card.on .ct{animation:lineIn 1.3s cubic-bezier(.2,.7,.2,1) forwards}
  #card .ct.d1{animation-delay:.8s} #card .ct.d2{animation-delay:1.8s}
  #card .ct.d3{animation-delay:2.8s} #card .ct.d4{animation-delay:3.6s}
  #card .ct.big{font-size:clamp(30px,8vw,68px);font-weight:600;letter-spacing:1px}
  #card .ct.gold{color:var(--gold)}
  #card .ct.heart{font-size:clamp(40px,12vw,90px)}
  #card .ct.small{font-size:clamp(15px,3.6vw,22px);letter-spacing:3px;
    text-transform:uppercase;font-family:var(--sans);color:var(--ink-soft);opacity:.0}
  #card.on .ct.small{animation:lineIn 1.3s ease forwards}
  #card .rule{width:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);
    margin:22px 0;transition:width 1.6s ease 1.2s}
  #card.on .rule{width:min(220px,60vw)}

  /* ===== Intro / start gate ===== */
  #gate{position:fixed;inset:0;z-index:20;display:flex;flex-direction:column;
    align-items:center;justify-content:center;text-align:center;padding:40px 28px;
    background:radial-gradient(120% 90% at 50% 35%,#2a1f16 0%,#0f0a07 100%);
    transition:opacity .9s ease}
  #gate.hide{opacity:0;pointer-events:none}
  #gate .kicker{font-size:13px;letter-spacing:4px;text-transform:uppercase;
    color:var(--gold);margin-bottom:18px;opacity:.9}
  #gate h1{font-family:var(--serif);font-weight:600;font-size:clamp(38px,11vw,86px);
    line-height:1.05;margin-bottom:8px}
  #gate .sub{font-family:var(--serif);font-size:clamp(18px,5vw,30px);color:var(--ink-soft);
    margin-bottom:38px;font-style:italic}
  #gate .play{display:inline-flex;align-items:center;gap:12px;cursor:pointer;
    background:linear-gradient(135deg,var(--gold),#d9a85f);color:#3a2410;border:none;
    font-family:var(--sans);font-weight:700;font-size:16px;letter-spacing:.5px;
    padding:16px 30px;border-radius:50px;box-shadow:0 10px 40px rgba(233,199,137,.35);
    transition:transform .15s ease,box-shadow .2s ease}
  #gate .play:hover{transform:translateY(-2px);box-shadow:0 14px 48px rgba(233,199,137,.5)}
  #gate .play svg{width:20px;height:20px;fill:#3a2410}
  #gate .music{margin-top:22px;font-size:13px;color:var(--ink-soft);opacity:.75;max-width:340px;line-height:1.6}
  #gate .music label{color:var(--gold);text-decoration:underline;cursor:pointer}
  #gate .music input{display:none}

  /* ===== Controls ===== */
  #controls{position:fixed;left:0;right:0;bottom:0;z-index:12;padding:14px 18px 18px;
    display:flex;align-items:center;gap:14px;
    background:linear-gradient(0deg,rgba(0,0,0,.55),transparent);
    opacity:0;transition:opacity .4s ease}
  #stage:hover #controls,#controls.show{opacity:1}
  #controls button{background:rgba(255,255,255,.12);border:none;color:var(--ink);
    width:42px;height:42px;border-radius:50%;cursor:pointer;display:flex;
    align-items:center;justify-content:center;backdrop-filter:blur(6px);transition:background .2s}
  #controls button:hover{background:rgba(255,255,255,.24)}
  #controls button svg{width:18px;height:18px;fill:currentColor}
  #progress{flex:1;height:4px;background:rgba(255,255,255,.2);border-radius:4px;overflow:hidden;cursor:pointer}
  #progress .fill{height:100%;width:0;background:var(--gold);border-radius:4px;transition:width .25s linear}
  #scene-no{font-size:12px;color:var(--ink-soft);min-width:42px;text-align:right;letter-spacing:.5px}

  /* ===== End screen ===== */
  #end{position:fixed;inset:0;z-index:15;display:none;flex-direction:column;
    align-items:center;justify-content:center;text-align:center;padding:40px 28px;
    background:radial-gradient(120% 90% at 50% 35%,#2a1f16 0%,#0f0a07 100%)}
  #end.on{display:flex}
  #end .heart{font-size:60px;margin-bottom:18px}
  #end h2{font-family:var(--serif);font-weight:600;font-size:clamp(28px,7vw,52px);margin-bottom:10px}
  #end p{font-family:var(--serif);font-style:italic;color:var(--ink-soft);
    font-size:clamp(16px,4.5vw,24px);max-width:520px;line-height:1.5;margin-bottom:32px}
  #end .btns{display:flex;gap:14px;flex-wrap:wrap;justify-content:center}
  #end button{background:rgba(255,255,255,.1);border:1px solid rgba(233,199,137,.4);
    color:var(--ink);font-family:var(--sans);font-weight:600;font-size:14px;
    padding:13px 24px;border-radius:50px;cursor:pointer;transition:background .2s}
  #end button.primary{background:linear-gradient(135deg,var(--gold),#d9a85f);color:#3a2410;border:none}
  #end button:hover{background:rgba(255,255,255,.2)}
  #end button.primary:hover{filter:brightness(1.05)}

  /* hearts float (subtle) */
  .float{position:absolute;bottom:-40px;font-size:22px;opacity:0;z-index:9;pointer-events:none;
    animation:floatUp linear forwards}
  @keyframes floatUp{0%{opacity:0;transform:translateY(0) scale(.6)}
    15%{opacity:.7}85%{opacity:.5}100%{opacity:0;transform:translateY(-115vh) scale(1)}}

  @media (prefers-reduced-motion: reduce){
    .layer.show .ph{animation:none!important}
  }
</style>
</head>
<body>

<div id="stage">
  <div class="bar top"></div>
  <div class="bar bottom"></div>
  <div class="layer" id="layerA"><div class="bg"></div><div class="ph"></div></div>
  <div class="layer" id="layerB"><div class="bg"></div><div class="ph"></div></div>
  <div id="vignette"></div>

  <div id="caption"></div>
  <div id="card"></div>

  <div id="controls">
    <button id="btnPlay" aria-label="Pausar">
      <svg id="icoPause" viewBox="0 0 24 24"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>
      <svg id="icoPlay" viewBox="0 0 24 24" style="display:none"><path d="M8 5v14l11-7z"/></svg>
    </button>
    <button id="btnMute" aria-label="Som">
      <svg id="icoSound" viewBox="0 0 24 24"><path d="M3 10v4h4l5 5V5L7 10H3zm13.5 2a4.5 4.5 0 00-2.5-4v8a4.5 4.5 0 002.5-4z"/></svg>
      <svg id="icoMute" viewBox="0 0 24 24" style="display:none"><path d="M3 10v4h4l5 5V5L7 10H3zm13 2 3 3 1.4-1.4L17.4 11l3-3L19 6.6l-3 3-3-3L11.6 8l3 3-3 3L13 15.4z"/></svg>
    </button>
    <div id="progress"><div class="fill"></div></div>
    <span id="scene-no"></span>
    <button id="btnRestart" aria-label="Recomeçar">
      <svg viewBox="0 0 24 24"><path d="M12 5V1L7 6l5 5V7a5 5 0 11-5 5H5a7 7 0 107-7z"/></svg>
    </button>
  </div>
</div>

<!-- Start gate -->
<div id="gate">
  <div class="kicker">Uma memória de família</div>
  <h1>O Primeiro Corte</h1>
  <div class="sub">Helena &amp; Vovó Mara</div>
  <button class="play" id="btnStart">
    <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
    Tocar o vídeo
  </button>
  <div class="music">
    Para emocionar ainda mais, toque com uma música suave ao fundo.<br>
    <label for="musicFile">Escolher música do seu aparelho</label>
    <input type="file" id="musicFile" accept="audio/*">
  </div>
  <audio id="bgm" loop preload="auto"></audio>
</div>

<!-- End screen -->
<div id="end">
  <div class="heart">❤️</div>
  <h2>Um amor para sempre</h2>
  <p>Família é onde as memórias mais bonitas começam.</p>
  <div class="btns">
    <button class="primary" id="btnReplay">Assistir novamente</button>
    <button id="btnLetter">Ler a carta da Helena</button>
  </div>
</div>

<script>
/* ============================================================
   ROTEIRO — "O Primeiro Corte"
   Timeline de cenas. Cada slide tem:
   - type: 'card' (texto em tela cheia) ou 'photo'
   - img:  caminho da foto (para 'photo')
   - dur:  duração em segundos
   - kb:   movimento ken-burns ('in','out','l','r')
   - lines: legendas (para 'photo') — aparecem sobre a imagem
   - cards: linhas de texto (para 'card')
   ============================================================ */
const P = 'assets/helena/';
const TL = [
  // ---- Cena 1 — Abertura ----
  {type:'card', dur:6.5, cards:[
    {t:'Existem momentos que passam…', c:'', d:'d1'},
    {t:'E existem momentos que ficam para sempre.', c:'gold', d:'d2'},
  ]},

  // ---- Cena 2 — Preparando tudo ----
  {type:'photo', img:P+'foto-01.jpg', dur:6, kb:'in', lines:[
    'Hoje não era apenas um corte de cabelo.'
  ]},
  {type:'photo', img:P+'foto-02.jpg', dur:6, kb:'l', lines:[
    'Era um daqueles dias que, sem perceber,','se tornam lembranças para toda a vida.'
  ]},
  {type:'photo', img:P+'foto-03.jpg', dur:5.5, kb:'out', lines:[]},

  // ---- Cena 3 — O carinho ----
  {type:'photo', img:P+'foto-04.jpg', dur:5.5, kb:'in', lines:[
    'Cada borrifada de água…'
  ]},
  {type:'photo', img:P+'foto-05.jpg', dur:5.5, kb:'r', lines:[
    'Cada mecha penteada…'
  ]},
  {type:'photo', img:P+'foto-06.jpg', dur:6, kb:'in', lines:[
    'Cada gesto carregava muito mais do que cuidado.','Carregava amor.'
  ]},

  // ---- Cena 4 — O olhar da Helena ----
  {type:'photo', img:P+'foto-09.jpg', dur:5.5, kb:'out', lines:[
    'Talvez ela ainda não entenda.'
  ]},
  {type:'photo', img:P+'foto-07.jpg', dur:5.5, kb:'l', lines:[]},
  {type:'photo', img:P+'foto-11.jpg', dur:6, kb:'in', lines:[
    'Mas um dia vai olhar essas imagens…'
  ]},
  {type:'photo', img:P+'foto-12.jpg', dur:6, kb:'in', lines:[
    'E perceber que foi cercada de amor','desde pequena.'
  ]},

  // ---- Cena 5 — A avó ----
  {type:'photo', img:P+'foto-08.jpg', dur:5.5, kb:'r', lines:[
    'As mãos que hoje penteiam…'
  ]},
  {type:'photo', img:P+'foto-10.jpg', dur:5.5, kb:'in', lines:[
    'São mãos que já cuidaram de tantos.'
  ]},
  {type:'photo', img:P+'foto-13.jpg', dur:6, kb:'l', lines:[
    'E agora escrevem mais um capítulo','da história da família.'
  ]},

  // ---- Encerramento (fotos finais) ----
  {type:'photo', img:P+'foto-14.jpg', dur:5, kb:'in', lines:[]},
  {type:'photo', img:P+'foto-15.jpg', dur:5, kb:'out', lines:[]},
  {type:'photo', img:P+'foto-16.jpg', dur:7, kb:'in', lines:[
    'Obrigada, Vó.'
  ]},

  // ---- Cena 6 — Cartões finais ----
  {type:'card', dur:7, cards:[
    {t:'Primeiro corte de cabelo da Helena', c:'', d:'d1'},
    {t:'pelas mãos da Vovó Mara', c:'gold', d:'d2'},
  ]},
  {type:'card', dur:6.5, cards:[
    {t:'Um momento simples.', c:'', d:'d1'},
    {t:'Um amor para sempre.', c:'gold', d:'d2'},
  ]},
];

/* ===== Texto da carta (epílogo opcional) ===== */
const LETTER = [
  'Vó…',
  'Talvez naquele dia eu só estivesse brincando com um borrifador de água.',
  'Talvez eu nem entendesse por que você penteava meu cabelo com tanto cuidado.',
  'Mas hoje eu sei.',
  'Você não estava apenas arrumando meus cabelos.',
  'Você estava deixando um pedaço do seu amor em cada lembrança.',
  'Obrigada por cuidar de mim com tanta paciência, tanto carinho e tanto amor.',
  'Eu talvez esqueça o dia…',
  'Mas nunca vou esquecer quem esteve ao meu lado.',
  'Eu te amo, Vó. ❤️'
];

/* ============================================================
   PLAYER
   ============================================================ */
const stage=document.getElementById('stage');
const layers=[document.getElementById('layerA'),document.getElementById('layerB')];
const captionEl=document.getElementById('caption');
const cardEl=document.getElementById('card');
const fill=document.querySelector('#progress .fill');
const sceneNo=document.getElementById('scene-no');
const bgm=document.getElementById('bgm');

let idx=-1, activeLayer=0, playing=false, raf=null;
let slideStart=0, slideDur=0, elapsedBefore=0, paused=false, pauseAt=0;
const totalDur=TL.reduce((s,x)=>s+x.dur,0);

/* preload */
TL.filter(s=>s.type==='photo').forEach(s=>{const i=new Image();i.src=s.img;});

function showCard(slide){
  captionEl.classList.remove('on'); captionEl.innerHTML='';
  layers.forEach(l=>l.classList.remove('show'));
  const parts=slide.cards.map(c=>`<span class="ct ${c.cls||''} ${c.c||''} ${c.d}">${c.t}</span>`);
  // decorative rule between the two lines
  if(parts.length>1) parts.splice(1,0,'<div class="rule"></div>');
  cardEl.innerHTML=parts.join('');
  cardEl.classList.remove('on'); void cardEl.offsetWidth; cardEl.classList.add('on');
}

function showPhoto(slide){
  cardEl.classList.remove('on');
  const next=1-activeLayer;
  const L=layers[next];
  L.querySelector('.bg').style.backgroundImage=`url('${slide.img}')`;
  const ph=L.querySelector('.ph');
  ph.style.backgroundImage=`url('${slide.img}')`;
  ph.className='ph k-'+(slide.kb||'in');
  L.style.setProperty('--dur',(slide.dur+1.6)+'s');
  layers[activeLayer].classList.remove('show');
  void L.offsetWidth;
  L.classList.add('show');
  activeLayer=next;
  // captions
  captionEl.classList.remove('on');
  if(slide.lines && slide.lines.length){
    captionEl.innerHTML=slide.lines.map(t=>`<span class="line">${t}</span>`).join('');
    void captionEl.offsetWidth;
    setTimeout(()=>captionEl.classList.add('on'),300);
  } else { captionEl.innerHTML=''; }
}

function renderSlide(i){
  const slide=TL[i];
  sceneNo.textContent=(i+1)+' / '+TL.length;
  if(slide.type==='card') showCard(slide); else showPhoto(slide);
}

function nextSlide(){
  idx++;
  if(idx>=TL.length){ finish(); return; }
  elapsedBefore=TL.slice(0,idx).reduce((s,x)=>s+x.dur,0);
  slideDur=TL[idx].dur;
  slideStart=performance.now();
  renderSlide(idx);
}

function tick(now){
  if(paused) return;
  const slideElapsed=(now-slideStart)/1000;
  const total=elapsedBefore+Math.min(slideElapsed,slideDur);
  fill.style.width=(total/totalDur*100)+'%';
  if(slideElapsed>=slideDur){ nextSlide(); }
  if(playing) raf=requestAnimationFrame(tick);
}

function start(){
  document.getElementById('end').classList.remove('on');
  idx=-1; activeLayer=0; playing=true; paused=false;
  layers.forEach(l=>l.classList.remove('show'));
  spawnHearts();
  nextSlide();
  cancelAnimationFrame(raf);
  raf=requestAnimationFrame(tick);
}

function togglePlay(){
  if(!playing) return;
  paused=!paused;
  document.getElementById('icoPause').style.display=paused?'none':'block';
  document.getElementById('icoPlay').style.display=paused?'block':'none';
  if(paused){
    pauseAt=performance.now();
    document.querySelectorAll('.ph').forEach(p=>p.style.animationPlayState='paused');
    if(!bgm.paused) bgm.pause();
  } else {
    const delta=performance.now()-pauseAt;
    slideStart+=delta;
    document.querySelectorAll('.ph').forEach(p=>p.style.animationPlayState='running');
    if(bgm.src && !muted) bgm.play().catch(()=>{});
    raf=requestAnimationFrame(tick);
  }
}

function finish(){
  playing=false; cancelAnimationFrame(raf);
  fill.style.width='100%';
  layers.forEach(l=>l.classList.remove('show'));
  cardEl.classList.remove('on'); captionEl.classList.remove('on');
  document.getElementById('end').classList.add('on');
  // let music fade out gently
  fadeOutMusic();
}

/* ===== Music ===== */
let muted=false;
function fadeOutMusic(){
  if(!bgm.src||bgm.paused) return;
  let v=bgm.volume;
  const f=setInterval(()=>{
    v-=0.04; if(v<=0){bgm.pause();bgm.volume=0.7;clearInterval(f);} else bgm.volume=v;
  },120);
}
function tryDefaultMusic(){
  // se você adicionar assets/helena/musica.mp3, ele toca automaticamente
  bgm.src=P+'musica.mp3';
}
document.getElementById('musicFile').addEventListener('change',e=>{
  const f=e.target.files[0]; if(!f) return;
  bgm.src=URL.createObjectURL(f);
  document.querySelector('#gate .music').innerHTML='♪ Música selecionada — toque o vídeo para começar.';
});

/* ===== Floating hearts ===== */
function spawnHearts(){
  const glyphs=['❤️','🤍','✨'];
  setInterval(()=>{
    if(!playing||paused) return;
    const h=document.createElement('div');
    h.className='float'; h.textContent=glyphs[Math.floor(Math.random()*glyphs.length)];
    h.style.left=(Math.random()*92+4)+'%';
    h.style.fontSize=(14+Math.random()*16)+'px';
    h.style.animationDuration=(9+Math.random()*7)+'s';
    stage.appendChild(h);
    setTimeout(()=>h.remove(),16000);
  },2600);
}

/* ===== Controls wiring ===== */
document.getElementById('btnStart').addEventListener('click',()=>{
  document.getElementById('gate').classList.add('hide');
  if(!bgm.src) tryDefaultMusic();
  bgm.volume=0.7;
  if(!muted){ bgm.play().catch(()=>{ /* sem música, segue só com a história */ }); }
  document.getElementById('controls').classList.add('show');
  setTimeout(()=>document.getElementById('controls').classList.remove('show'),2600);
  start();
});
document.getElementById('btnPlay').addEventListener('click',togglePlay);
document.getElementById('btnRestart').addEventListener('click',()=>{
  if(bgm.src){bgm.currentTime=0;bgm.volume=0.7;if(!muted)bgm.play().catch(()=>{});}
  start();
});
document.getElementById('btnReplay').addEventListener('click',()=>{
  if(bgm.src){bgm.currentTime=0;bgm.volume=0.7;if(!muted)bgm.play().catch(()=>{});}
  start();
});
document.getElementById('btnMute').addEventListener('click',()=>{
  muted=!muted; bgm.muted=muted;
  document.getElementById('icoSound').style.display=muted?'none':'block';
  document.getElementById('icoMute').style.display=muted?'block':'none';
  if(!muted && bgm.src && playing && !paused) bgm.play().catch(()=>{});
});
document.getElementById('progress').addEventListener('click',e=>{
  if(!playing) return;
  const r=e.currentTarget.getBoundingClientRect();
  const pct=(e.clientX-r.left)/r.width;
  let target=pct*totalDur, acc=0, ni=0;
  for(let i=0;i<TL.length;i++){ if(acc+TL[i].dur>target){ni=i;break;} acc+=TL[i].dur; }
  idx=ni-1; if(paused) togglePlay(); nextSlide();
});

/* ===== Letter epilogue ===== */
document.getElementById('btnLetter').addEventListener('click',()=>{
  const end=document.getElementById('end');
  end.innerHTML=`
    <div class="heart">💌</div>
    <h2 style="margin-bottom:18px">Para a Vovó Mara</h2>
    <div style="max-width:560px;font-family:var(--serif);font-style:italic;
      color:var(--ink-soft);font-size:clamp(16px,4.4vw,22px);line-height:1.7;
      margin-bottom:30px">
      ${LETTER.map(l=>`<p style="margin-bottom:12px">${l}</p>`).join('')}
    </div>
    <div class="btns"><button class="primary" id="btnReplay2">Assistir novamente</button></div>`;
  document.getElementById('btnReplay2').addEventListener('click',()=>{
    location.reload();
  });
});

/* keyboard */
document.addEventListener('keydown',e=>{
  if(e.code==='Space'){e.preventDefault();togglePlay();}
});
</script>
